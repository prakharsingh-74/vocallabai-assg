<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>VocalFlow Settings</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="container">
      <header>
        <h1>VocalFlow</h1>
        <p id="status">Press <strong>Alt</strong> to record</p>
      </header>

      <div class="card">
        <h2>Deepgram</h2>
        <div class="balance-info">
          <span>Balance:</span>
          <span id="dg-balance">$0.00</span>
        </div>
      </div>

      <div class="card">
        <h2>Groq</h2>
        <div class="balance-info">
          <span>Usage:</span>
          <span id="groq-balance">Free Tier</span>
        </div>
      </div>

      <div class="settings">
        <h2>Settings</h2>
        <p>Edit <strong>config.json</strong> to change API keys, models, and hotkeys.</p>
      </div>

      <footer>
        <p>Hotkey: <strong>Alt</strong> (Hold to Record)</p>
      </footer>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
